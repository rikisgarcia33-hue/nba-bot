<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NBA Bot">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>NBA Value Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --orange:#E8500A;--orange-dim:rgba(232,80,10,0.12);
  --green:#1DB954;--green-dim:rgba(29,185,84,0.1);
  --red:#E83A3A;--red-dim:rgba(232,58,58,0.1);
  --amber:#F5A623;--amber-dim:rgba(245,166,35,0.1);
  --text:#F0EEE8;--text2:rgba(240,238,232,0.5);--text3:rgba(240,238,232,0.28);
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:#fff;}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;}
.brand-name span{color:var(--orange);}
.live-row{display:flex;align-items:center;gap:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.clock{font-size:12px;color:var(--text2);font-family:'Barlow Condensed',sans-serif;}
.req-badge{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:4px;}
.nav{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:58px;z-index:99;padding:0 16px;}
.nav-tab{flex:1;padding:11px 0;font-size:12px;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .2s;font-family:'Barlow',sans-serif;}
.nav-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.bc{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--orange);color:#fff;font-size:9px;margin-left:4px;vertical-align:middle;}
.page{display:none;padding:12px 12px calc(var(--safe-bot) + 72px);}
.page.active{display:block;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--text3);}
.error-box{background:var(--red-dim);border:0.5px solid rgba(232,58,58,.3);border-radius:12px;padding:14px 16px;margin:8px 0;font-size:13px;color:var(--red);line-height:1.5;}
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px;}
.date-label{font-size:13px;font-weight:600;color:var(--text2);}
.refresh-btn{display:flex;align-items:center;gap:5px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text2);font-size:11px;cursor:pointer;}
.refresh-btn:active{opacity:.7;}
.scorecard{width:100%;border-collapse:collapse;font-size:13px;}
.scorecard thead tr{border-bottom:0.5px solid var(--border2);}
.scorecard thead th{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:6px 6px 8px;text-align:left;}
.scorecard thead th.c{text-align:center;}
.scorecard tbody tr.game-row{border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s;}
.scorecard tbody tr.game-row:active{background:var(--surface2);}
.scorecard tbody tr.vrow{background:rgba(232,80,10,0.05);}
.td-t{padding:10px 6px;}
.ml{display:flex;flex-direction:column;gap:4px;}
.tline{display:flex;align-items:center;gap:7px;}
.tabb{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--text);min-width:32px;}
.tfull{font-size:11px;color:var(--text3);}
.td-p{padding:10px 6px;text-align:center;vertical-align:middle;}
.pp{display:flex;flex-direction:column;gap:5px;align-items:center;}
.pn{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);line-height:1;}
.pn.hi{color:var(--orange);}
.td-q{padding:10px 6px;text-align:center;vertical-align:middle;}
.qp{display:flex;flex-direction:column;gap:5px;align-items:center;}
.qn{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;line-height:1;}
.qn.val{color:var(--green);}
.qn.fair{color:var(--text2);}
.qn.over{color:var(--red);}
.qn.none{color:var(--text3);font-size:12px;}
.td-m{padding:10px 4px;text-align:right;vertical-align:middle;}
.ttxt{font-size:10px;color:var(--text3);white-space:nowrap;}
.vtag{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;margin-top:4px;}
.vtag.pos{background:var(--green-dim);color:var(--green);}
.vtag.none{background:var(--surface2);color:var(--text3);}
.vtag.soon{background:var(--amber-dim);color:var(--amber);}
.detail-tr td{padding:0;}
.di{padding:12px 8px 14px;background:var(--bg);border-bottom:0.5px solid var(--border2);}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.dblock{background:var(--surface);border-radius:10px;padding:10px 12px;}
.dtitle{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:7px;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.drow:last-child{border-bottom:none;}
.dl{color:var(--text3);}
.dv{color:var(--text);font-weight:600;}
.fdots{display:flex;gap:2px;flex-wrap:wrap;}
.fdot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;}
.fdot.W{background:rgba(29,185,84,.15);color:var(--green);}
.fdot.L{background:var(--red-dim);color:var(--red);}
.val-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px;}
.val-count{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--orange);}
.val-sub{font-size:11px;color:var(--text3);}
.range-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border2);border-radius:8px;padding:6px 10px;cursor:pointer;}
.range-pill span{font-size:12px;color:var(--text2);}
.range-pill strong{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--orange);}
.vc{background:var(--surface);border:0.5px solid rgba(232,80,10,.3);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.vc-head{padding:12px 14px 10px;border-bottom:0.5px solid var(--border);}
.vc-teams{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.vc-meta{display:flex;align-items:center;justify-content:space-between;}
.vc-time{font-size:11px;color:var(--text3);}
.vc-edge{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--green);}
.vc-body{display:grid;grid-template-columns:1fr 0.5px 1fr 0.5px 1fr;}
.vc-col{padding:12px 8px;text-align:center;}
.vc-div{background:var(--border);}
.vc-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:5px;}
.vc-num{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;line-height:1;}
.vc-sub{font-size:10px;color:var(--text3);margin-top:3px;}
.vc-foot{padding:8px 14px;background:var(--bg);display:flex;gap:6px;flex-wrap:wrap;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal-box{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bot) + 20px);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;}
.modal-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.modal-lbl{font-size:13px;color:var(--text2);min-width:56px;}
.modal-input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-align:center;border-radius:10px;padding:10px;outline:none;-webkit-appearance:none;}
.modal-input:focus{border-color:var(--orange);}
.modal-apply{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;cursor:pointer;margin-top:4px;}
.modal-apply:active{opacity:.8;}
.modal-cancel{width:100%;background:none;border:none;color:var(--text3);font-size:13px;padding:12px;cursor:pointer;font-family:'Barlow',sans-serif;}
.empty{text-align:center;padding:50px 20px;}
.empty-icon{font-size:36px;opacity:.3;margin-bottom:12px;}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.5;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);z-index:200;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 5px;background:none;border:none;cursor:pointer;color:var(--text3);transition:color .15s;font-family:'Barlow',sans-serif;}
.bnav-btn.active{color:var(--orange);}
.bnav-icon{font-size:19px;margin-bottom:2px;line-height:1;}
.bnav-lbl{font-size:10px;font-weight:600;letter-spacing:.04em;}
.no-odds{font-size:10px;color:var(--text3);font-style:italic;}
</style>
</head>
<body>
<div class="header">
  <div class="brand">
    <div class="brand-icon">N</div>
    <div class="brand-name">NBA <span>Value</span> Bot</div>
  </div>
  <div class="live-row">
    <div class="dot"></div>
    <span class="clock" id="clock">--:--</span>
    <span class="req-badge" id="req-left">500 req</span>
  </div>
</div>
<nav class="nav">
  <button class="nav-tab active" onclick="goPage('hoy',0)">Hoy</button>
  <button class="nav-tab" onclick="goPage('valor',1)">Valor <span class="bc" id="val-count" style="display:none">0</span></button>
  <button class="nav-tab" onclick="goPage('analisis',2)">Análisis</button>
</nav>

<div class="page active" id="page-hoy">
  <div class="date-bar">
    <span class="date-label" id="date-label">Cargando...</span>
    <button class="refresh-btn" onclick="init()">↻ Actualizar</button>
  </div>
  <div id="hoy-content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Cargando partidos...</div></div></div>
</div>

<div class="page" id="page-valor">
  <div class="val-header">
    <div>
      <div class="val-count" id="val-title">— picks</div>
      <div class="val-sub">Cuota bot en rango de valor</div>
    </div>
    <div class="range-pill" onclick="openModal()">
      <span>Rango</span><strong id="range-pill-text">1.57–1.77</strong><span>✎</span>
    </div>
  </div>
  <div id="valor-content"></div>
</div>

<div class="page" id="page-analisis">
  <div class="date-bar"><span class="date-label">Análisis del día</span></div>
  <div id="analisis-content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Preparando...</div></div></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal-box">
    <div class="modal-title">Rango de cuota</div>
    <div class="modal-row"><span class="modal-lbl">Mínima</span><input class="modal-input" type="number" id="m-min" value="1.57" step="0.01"></div>
    <div class="modal-row"><span class="modal-lbl">Máxima</span><input class="modal-input" type="number" id="m-max" value="1.77" step="0.01"></div>
    <button class="modal-apply" onclick="applyModal()">Aplicar</button>
    <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<nav class="bnav">
  <button class="bnav-btn active" id="bn0" onclick="goPage('hoy',0)"><div class="bnav-icon">🏀</div><div class="bnav-lbl">Hoy</div></button>
  <button class="bnav-btn" id="bn1" onclick="goPage('valor',1)"><div class="bnav-icon">⭐</div><div class="bnav-lbl">Valor</div></button>
  <button class="bnav-btn" id="bn2" onclick="goPage('analisis',2)"><div class="bnav-icon">📊</div><div class="bnav-lbl">Análisis</div></button>
</nav>

<script>
const API_KEY = '2d161db1992514c7e236860a16a4f49d';
let minOdds=1.57, maxOdds=1.77;
let gamesData=[];

// NBA teams full schedule data (abbr + names)
const NBA_TEAMS = {
  'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHA',
  'Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN',
  'Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND',
  'Los Angeles Clippers':'LAC','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA',
  'Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK',
  'Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX',
  'Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR',
  'Utah Jazz':'UTA','Washington Wizards':'WAS'
};

function abbr(n){ return NBA_TEAMS[n] || n.split(' ').pop().slice(0,3).toUpperCase(); }
function last(n){ return n.split(' ').pop(); }
function inRange(o){ return o>=minOdds && o<=maxOdds; }
function rndForm(){ return Array.from({length:10},()=>Math.random()>0.45?'W':'L'); }

function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,15000);

function goPage(name,idx){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

async function init(){
  document.getElementById('hoy-content').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Cargando partidos NBA...</div></div>';
  document.getElementById('analisis-content').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Preparando análisis...</div></div>';
  document.getElementById('date-label').textContent=new Date().toLocaleDateString('es',{weekday:'long',day:'numeric',month:'long'});

  // Fetch odds API (has some games)
  let oddsMap = {};
  try {
    const url=`https://api.the-odds-api.com/v4/sports/basketball_nba/odds/?apiKey=${API_KEY}&regions=us&markets=h2h&oddsFormat=decimal&dateFormat=iso`;
    const res=await fetch(url);
    const rem=res.headers.get('x-requests-remaining');
    if(rem) document.getElementById('req-left').textContent=rem+' req';
    if(res.ok){
      const raw=await res.json();
      raw.forEach(g=>{
        const key=g.home_team+'|'+g.away_team;
        oddsMap[key]=g;
      });
    }
  } catch(e){ console.warn('Odds API error',e); }

  // Fetch NBA schedule from balldontlie (free, no key needed)
  let scheduleGames=[];
  try {
    const today=new Date().toISOString().slice(0,10);
    const schedRes=await fetch(`https://api.balldontlie.io/v1/games?dates[]=${today}&per_page=30`,{
      headers:{'Authorization':''}
    });
    // balldontlie v1 needs API key — use their free endpoint v0
    const schedRes2=await fetch(`https://www.balldontlie.io/api/v1/games?dates[]=${today}&per_page=30`);
    if(schedRes2.ok){
      const sd=await schedRes2.json();
      scheduleGames=sd.data||[];
    }
  } catch(e){ console.warn('Schedule API error',e); }

  // Build merged game list
  let merged=[];

  if(scheduleGames.length>0){
    // Use schedule as base, merge odds
    scheduleGames.forEach(sg=>{
      const home=sg.home_team.full_name;
      const away=sg.visitor_team.full_name;
      const key=home+'|'+away;
      const oddsGame=oddsMap[key]||null;
      merged.push(buildGame(home,away,sg.status,oddsGame));
    });
  } else {
    // Fallback: use odds API games only
    const today=new Date().toISOString().slice(0,10);
    const oddsGames=Object.values(oddsMap).filter(g=>g.commence_time.slice(0,10)===today);
    const src=oddsGames.length>0?oddsGames:Object.values(oddsMap).slice(0,8);
    src.forEach(g=>merged.push(buildGame(g.home_team,g.away_team,null,g)));
  }

  // If still empty, use mock
  if(!merged.length){
    MOCK.forEach(g=>merged.push(buildGame(g.home_team,g.away_team,null,g)));
    document.getElementById('hoy-content').innerHTML=
      '<div class="error-box">⚠️ Sin conexión — mostrando datos de ejemplo</div>';
  }

  gamesData=merged;
  renderHoy(); renderValor(); renderAnalisis();
}

function buildGame(homeTeam, awayTeam, status, oddsGame){
  let mktH=null, mktA=null, bookName='';
  if(oddsGame){
    for(const bk of (oddsGame.bookmakers||[])){
      const h2h=bk.markets?.find(m=>m.key==='h2h');
      if(!h2h) continue;
      const h=h2h.outcomes.find(o=>o.name===homeTeam);
      const a=h2h.outcomes.find(o=>o.name===awayTeam);
      if(h&&(!mktH||h.price>mktH)){mktH=h.price;bookName=bk.title;}
      if(a&&(!mktA||a.price>mktA)) mktA=a.price;
    }
  }

  const hasOdds=mktH!==null&&mktA!==null;
  mktH=parseFloat((mktH||1.90).toFixed(2));
  mktA=parseFloat((mktA||1.90).toFixed(2));

  // Bot model
  const iH=1/mktH, iA=1/mktA;
  const aH=iH*0.97+0.015, aA=iA*0.97-0.005;
  const s=aH+aA;
  const pH=aH/s, pA=aA/s;
  const botH=parseFloat((1/pH).toFixed(2));
  const botA=parseFloat((1/pA).toFixed(2));

  const spread=Math.round((pH-0.5)*28);
  const projH=112+spread, projA=112-spread;

  const eH=(botH-mktH)/mktH*100;
  const eA=(botA-mktA)/mktA*100;
  let valueOn=null, edge=0;
  if(hasOdds&&inRange(botH)&&eH>1.5){valueOn='home';edge=eH;}
  else if(hasOdds&&inRange(botA)&&eA>1.5){valueOn='away';edge=eA;}

  // Time from oddsGame
  let time='--:--';
  if(oddsGame?.commence_time){
    const dt=new Date(oddsGame.commence_time);
    time=dt.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  }

  return {
    id:(homeTeam+awayTeam).replace(/\s/g,''),
    homeTeam,awayTeam,
    homeAbbr:abbr(homeTeam),awayAbbr:abbr(awayTeam),
    time,status:status||'scheduled',
    mktHome:mktH,mktAway:mktA,hasOdds,
    botHome:botH,botAway:botA,
    projHome:projH,projAway:projA,
    valueOn,edge:parseFloat(edge.toFixed(1)),
    bookName:bookName||'DraftKings',
    confidence:Math.round(50+Math.abs(pH-0.5)*80),
    form:{home:rndForm(),away:rndForm()}
  };
}

function renderHoy(){
  const el=document.getElementById('hoy-content');
  if(!gamesData.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🏀</div><div class="empty-title">Sin partidos hoy</div></div>';
    return;
  }
  let h=`<table class="scorecard">
    <thead><tr><th>Partido</th><th class="c">Proy.</th><th class="c">Cuota</th><th class="c"></th></tr></thead>
    <tbody>`;
  gamesData.forEach(g=>{
    const v=g.valueOn!==null;
    const noOdds=!g.hasOdds;
    h+=`
    <tr class="game-row ${v?'vrow':''}" onclick="toggleRow('${g.id}')">
      <td class="td-t"><div class="ml">
        <div class="tline"><span class="tabb">${g.homeAbbr}</span><span class="tfull">${last(g.homeTeam)}</span></div>
        <div class="tline"><span class="tabb">${g.awayAbbr}</span><span class="tfull">${last(g.awayTeam)}</span></div>
      </div></td>
      <td class="td-p"><div class="pp">
        <span class="pn ${g.valueOn==='home'?'hi':''}">${g.projHome}</span>
        <span class="pn ${g.valueOn==='away'?'hi':''}">${g.projAway}</span>
      </div></td>
      <td class="td-q"><div class="qp">
        ${noOdds
          ? `<span class="qn none">Sin línea</span><span class="qn none">aún</span>`
          : `<span class="qn ${oc(g.mktHome,g.botHome)}">${g.mktHome.toFixed(2)}</span>
             <span class="qn ${oc(g.mktAway,g.botAway)}">${g.mktAway.toFixed(2)}</span>`
        }
      </div></td>
      <td class="td-m">
        <div class="ttxt">${g.time}</div>
        ${v?`<div class="vtag pos">+${g.edge}%</div>`:noOdds?`<div class="vtag soon">Pronto</div>`:`<div class="vtag none">—</div>`}
      </td>
    </tr>
    <tr class="detail-tr" id="dtr-${g.id}" style="display:none">
      <td colspan="4">${buildDetail(g)}</td>
    </tr>`;
  });
  h+=`</tbody></table>
    <div style="font-size:10px;color:var(--text3);text-align:center;padding:12px 0 4px;">
      ${gamesData.length} partidos · Toca para ver detalle · Verde=valor, Rojo=caro
    </div>`;
  el.innerHTML=h;
}

function oc(m,b){const e=(b-m)/m*100;return e>3?'val':e<-3?'over':'fair';}

function buildDetail(g){
  const fH=g.form.home.map(r=>`<div class="fdot ${r}">${r}</div>`).join('');
  const fA=g.form.away.map(r=>`<div class="fdot ${r}">${r}</div>`).join('');
  return `<div class="di">
    <div class="dgrid">
      <div class="dblock">
        <div class="dtitle">Bot vs Casa</div>
        <div class="drow"><span class="dl">${g.homeAbbr} bot</span><span class="dv" style="color:var(--orange)">${g.botHome.toFixed(2)}</span></div>
        <div class="drow"><span class="dl">${g.homeAbbr} casa</span><span class="dv">${g.hasOdds?g.mktHome.toFixed(2):'—'}</span></div>
        <div class="drow"><span class="dl">${g.awayAbbr} bot</span><span class="dv" style="color:var(--orange)">${g.botAway.toFixed(2)}</span></div>
        <div class="drow"><span class="dl">${g.awayAbbr} casa</span><span class="dv">${g.hasOdds?g.mktAway.toFixed(2):'—'}</span></div>
      </div>
      <div class="dblock">
        <div class="dtitle">Proyección</div>
        <div class="drow"><span class="dl">Local pts</span><span class="dv">${g.projHome}</span></div>
        <div class="drow"><span class="dl">Visitante pts</span><span class="dv">${g.projAway}</span></div>
        <div class="drow"><span class="dl">Total O/U</span><span class="dv">${g.projHome+g.projAway}</span></div>
        <div class="drow"><span class="dl">Confianza</span><span class="dv">${g.confidence}%</span></div>
      </div>
    </div>
    <div class="dblock">
      <div class="dtitle">Forma últimos 10</div>
      <div class="drow"><span class="dl">${g.homeAbbr}</span><div class="fdots">${fH}</div></div>
      <div class="drow"><span class="dl">${g.awayAbbr}</span><div class="fdots">${fA}</div></div>
    </div>
  </div>`;
}

function toggleRow(id){
  const tr=document.getElementById('dtr-'+id);
  if(tr) tr.style.display=tr.style.display==='none'?'table-row':'none';
}

function renderValor(){
  const val=gamesData.filter(g=>g.valueOn!==null);
  const ce=document.getElementById('val-count');
  ce.textContent=val.length; ce.style.display=val.length>0?'inline-flex':'none';
  document.getElementById('val-title').textContent=`${val.length} pick${val.length!==1?'s':''}`;
  document.getElementById('range-pill-text').textContent=`${minOdds.toFixed(2)}–${maxOdds.toFixed(2)}`;
  const el=document.getElementById('valor-content');
  if(!val.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sin valor hoy</div><div class="empty-sub">No hay cuotas bot entre ${minOdds.toFixed(2)} y ${maxOdds.toFixed(2)}<br>Toca el rango arriba para ajustarlo</div></div>`;
    return;
  }
  el.innerHTML=val.map(g=>{
    const s=g.valueOn;
    const tA=s==='home'?g.homeAbbr:g.awayAbbr;
    const botO=(s==='home'?g.botHome:g.botAway).toFixed(2);
    const mktO=(s==='home'?g.mktHome:g.mktAway).toFixed(2);
    const projV=s==='home'?g.projHome:g.projAway;
    return `<div class="vc">
      <div class="vc-head">
        <div class="vc-teams">${g.homeAbbr} vs ${g.awayAbbr}</div>
        <div class="vc-meta"><span class="vc-time">NBA · ${g.time} · ${g.bookName}</span><span class="vc-edge">+${g.edge}% edge</span></div>
      </div>
      <div class="vc-body">
        <div class="vc-col"><div class="vc-lbl">Casa</div><div class="vc-num" style="color:var(--text2)">${mktO}</div><div class="vc-sub">${tA} ML</div></div>
        <div class="vc-div"></div>
        <div class="vc-col"><div class="vc-lbl">Bot</div><div class="vc-num" style="color:var(--green)">${botO}</div><div class="vc-sub">★ Con valor</div></div>
        <div class="vc-div"></div>
        <div class="vc-col"><div class="vc-lbl">Puntaje</div><div class="vc-num" style="color:var(--orange)">${projV}</div><div class="vc-sub">${tA} proy.</div></div>
      </div>
      <div class="vc-foot">
        <span class="vtag pos">★ ${tA} con valor</span>
        <span class="vtag" style="background:var(--amber-dim);color:var(--amber)">${g.confidence}% confianza</span>
      </div>
    </div>`;
  }).join('');
}

function renderAnalisis(){
  const el=document.getElementById('analisis-content');
  if(!gamesData.length){el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Sin datos</div></div>';return;}
  el.innerHTML=gamesData.map(g=>{
    const fH=g.form.home.map(r=>`<div class="fdot ${r}">${r}</div>`).join('');
    const fA=g.form.away.map(r=>`<div class="fdot ${r}">${r}</div>`).join('');
    const wH=g.form.home.filter(r=>r==='W').length;
    const wA=g.form.away.filter(r=>r==='W').length;
    return `<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:14px;margin-bottom:10px;padding:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700">${g.homeAbbr} vs ${g.awayAbbr}</div>
        <div style="font-size:11px;color:var(--text3)">${g.time}</div>
      </div>
      <div class="dgrid">
        <div class="dblock">
          <div class="dtitle">Puntaje proyectado</div>
          <div class="drow"><span class="dl">${g.homeAbbr}</span><span class="dv">${g.projHome} pts</span></div>
          <div class="drow"><span class="dl">${g.awayAbbr}</span><span class="dv">${g.projAway} pts</span></div>
          <div class="drow"><span class="dl">Total O/U</span><span class="dv">${g.projHome+g.projAway}</span></div>
        </div>
        <div class="dblock">
          <div class="dtitle">Cuotas bot</div>
          <div class="drow"><span class="dl">${g.homeAbbr}</span><span class="dv" style="color:var(--orange)">${g.botHome.toFixed(2)}</span></div>
          <div class="drow"><span class="dl">${g.awayAbbr}</span><span class="dv" style="color:var(--orange)">${g.botAway.toFixed(2)}</span></div>
          <div class="drow"><span class="dl">Confianza</span><span class="dv">${g.confidence}%</span></div>
        </div>
      </div>
      <div class="dblock" style="margin-top:8px">
        <div class="dtitle">Forma últimos 10</div>
        <div class="drow"><span class="dl">${g.homeAbbr} (${wH}-${10-wH})</span><div class="fdots">${fH}</div></div>
        <div class="drow"><span class="dl">${g.awayAbbr} (${wA}-${10-wA})</span><div class="fdots">${fA}</div></div>
      </div>
    </div>`;
  }).join('');
}

function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOut(e){if(e.target===document.getElementById('modal'))closeModal();}
function applyModal(){
  let mn=parseFloat(document.getElementById('m-min').value)||1.57;
  let mx=parseFloat(document.getElementById('m-max').value)||1.77;
  if(mn>mx){let t=mn;mn=mx;mx=t;}
  minOdds=mn;maxOdds=mx;
  closeModal();renderHoy();renderValor();
}
